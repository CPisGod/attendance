<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>출석부</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ===== 일반 사용자 화면 ===== -->
  <div id="user-screen" class="screen active">
    <div class="card user-card">
      <div class="logo-area">
        <div class="logo-icon">✦</div>
        <h1 class="logo-title">출석 체크</h1>
        <p class="logo-sub">오늘의 출석을 등록하세요</p>
      </div>

      <!-- 오늘의 한마디 -->
      <div id="daily-message-box" class="daily-message hidden">
        <span class="daily-message-icon">💬</span>
        <span id="daily-message-text"></span>
      </div>

      <div class="form-group">
        <label for="user-name">이름</label>
        <input type="text" id="user-name" placeholder="이름을 입력하세요" autocomplete="off" />
      </div>

      <div class="form-group">
        <label for="user-code">출석 암호</label>
        <input type="text" id="user-code" placeholder="오늘의 암호를 입력하세요" autocomplete="off" />
      </div>

      <button id="btn-attend" class="btn btn-primary">출석하기</button>

      <div id="user-msg" class="msg-box hidden"></div>
    </div>

    <!-- 어드민 전환 영역 (맨 하단) -->
    <div class="admin-gate">
      <details>
        <summary>관리자 접속</summary>
        <div class="admin-gate-inner">
          <input type="password" id="admin-password-input" placeholder="관리자 비밀번호" />
          <button id="btn-admin-login" class="btn btn-sm">확인</button>
          <div id="admin-login-msg" class="msg-box hidden"></div>
        </div>
      </details>
    </div>
  </div>

  <!-- ===== 어드민 화면 ===== -->
  <div id="admin-screen" class="screen hidden">
    <header class="admin-header">
      <div class="admin-header-left">
        <span class="logo-icon small">✦</span>
        <span class="admin-title">관리자 패널</span>
      </div>
      <button id="btn-logout" class="btn btn-sm btn-ghost">로그아웃</button>
    </header>

    <div class="admin-body">

      <!-- 오늘의 한마디 관리 -->
      <section class="panel">
        <h2 class="panel-title">오늘의 한마디</h2>
        <div class="code-display" id="current-message-display" style="font-family:var(--font-main);font-size:0.95rem;letter-spacing:0;">설정된 메시지 없음</div>
        <div class="code-edit-col">
          <textarea id="new-message-input" placeholder="사용자 화면에 표시할 한마디를 입력하세요" rows="3"></textarea>
          <div style="display:flex;gap:8px;">
            <button id="btn-save-message" class="btn btn-primary" style="flex:1">저장</button>
            <button id="btn-clear-message" class="btn btn-ghost btn-sm">지우기</button>
          </div>
        </div>
        <div id="message-msg" class="msg-box hidden"></div>
      </section>

      <!-- 암호 관리 -->
      <section class="panel">
        <h2 class="panel-title">오늘의 출석 암호</h2>
        <div class="code-display" id="current-code-display">로딩 중…</div>
        <div class="code-edit-col">
          <input type="text" id="new-code-input" placeholder="새 암호 입력" />
          <button id="btn-save-code" class="btn btn-primary">저장</button>
        </div>
        <div id="code-msg" class="msg-box hidden"></div>
      </section>

      <!-- 인원 관리 -->
      <section class="panel">
        <h2 class="panel-title">인원 관리</h2>
        <div class="member-add-row">
          <input type="text" id="new-member-input" placeholder="이름 입력" />
          <button id="btn-add-member" class="btn btn-accent btn-sm">+ 추가</button>
        </div>
        <div id="member-msg" class="msg-box hidden"></div>
      </section>

      <!-- 주간 출석표 -->
      <section class="panel panel-wide">
        <div class="panel-title-row">
          <h2 class="panel-title">주간 출석표</h2>
          <div class="week-nav">
            <button id="btn-week-prev" class="btn btn-ghost btn-sm">‹ 이전</button>
            <span id="week-label" class="week-label">로딩 중…</span>
            <button id="btn-week-next" class="btn btn-ghost btn-sm">다음 ›</button>
          </div>
        </div>
        <div class="weekly-table-wrap">
          <table id="weekly-table" class="weekly-table">
            <thead id="weekly-thead"></thead>
            <tbody id="weekly-tbody"></tbody>
          </table>
        </div>
      </section>

      <!-- 출석 현황 -->
      <section class="panel">
        <div class="panel-title-row">
          <h2 class="panel-title">출석 현황</h2>
          <button id="btn-reset-attendance" class="btn btn-danger btn-sm">오늘 출석 초기화</button>
        </div>
        <div class="attendance-stats" id="attendance-stats">
          <span class="stat"><span id="stat-total">0</span>명 등록</span>
          <span class="stat accent"><span id="stat-present">0</span>명 출석</span>
          <span class="stat muted"><span id="stat-absent">0</span>명 미출석</span>
        </div>
        <!-- 필터 탭 -->
        <div class="filter-tabs">
          <button class="filter-tab active" data-filter="all">전체</button>
          <button class="filter-tab" data-filter="present">출석</button>
          <button class="filter-tab" data-filter="absent">미출석</button>
        </div>
        <div id="member-list" class="member-list">
          <!-- 동적으로 생성 -->
        </div>
      </section>
    </div>
  </div>

  <!-- Firebase -->
  <script type="module" src="app.js"></script>
</body>
</html>
